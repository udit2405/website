<style>

  border-radius:10px;
  text-decoration:none;
  font-size:14px;
  font-weight:600;

  z-index:9999;
  transition:all 0.3s ease;
}
.jump-btn:hover{
  background:#e0b84f;
  transform:translateY(-3px) scale(1.05);
}

/* ===== BASE ===== */
body {
  margin: 0;
  color: #eaeaea;
  font-family: 'Inter', sans-serif;
  background: 
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)),
    url("gym.jpg");

  background-position: center;
  background-attachment: fixed;
}

/* ===== CONTENT ===== */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 60px 20px;
}

h1 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  font-size: 2.8rem;
}

.gold { color: #C9A84C; }

.subtext {
  text-align: center;
  max-width: 700px;
  margin: 20px auto 40px; /* 🔥 reduced */
  color: #aaa;
}

/* ===== BADGES ===== */
.badges {
  display: grid;
  grid-template-columns: repeat(3, auto);
  justify-content: center;
  gap: 18px;
  margin-bottom: 20px; /* 🔥 MAJOR FIX */
}

.badge {
  text-align:center;
  padding:18px 14px;
  max-width:240px;
  margin:auto;
  background:rgba(255,255,255,0.03);
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
}
.badge:hover{
  transform:translateY(-6px);
  border-color:rgba(201,168,76,0.5);
  box-shadow:0 10px 30px rgba(201,168,76,0.15);
}

.badge-icon{font-size:20px;margin-bottom:6px;}
.badge-title{font-size:15px;font-weight:600;margin-bottom:6px;}
.badge p{color:#aaa;font-size:13px;}

/* ===== TEAM ===== */
.team{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
  margin-top:-40px; /* 🔥 MAIN GAP FIX */
}

.card{
  background:rgba(255,255,255,0.03);
  padding:16px 18px 20px;
  border-radius:16px;
  text-align:center;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-6px);
  border:1px solid rgba(201,168,76,0.4);
}

.avatar{
  width:85px;
  height:85px;
  margin:auto;

  border:2px solid #C9A84C;
}
.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
.role{
  font-size:0.8rem;
  color:#C9A84C;
  margin-top:2px;
  font-weight:500;
}

.desc{
  font-size:0.83rem;
  color:#aaa;
  margin-top:4px;
  line-height:1.5;
}

/* ===== FLOATING BOX ===== */
.floating-box{
  position:fixed;
  right:40px;
  top:90px;
  width:200px;
  padding:20px;
  border-radius:18px;
  background:rgba(15,15,15,0.75);
  backdrop-filter:blur(18px);
  border:1px solid rgba(201,168,76,0.3);
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
  z-index:999;
}

.floating-box:hover{
  transform:translateY(-4px) scale(1.02);
}

.floating-box .live{
  color:#4CAF50;
  font-size:13px;

}

.floating-box .slots{
  font-size:24px;
  font-weight:600;
  margin-bottom:20px;
}

  width:100%;
  padding:13px;

  border-radius:10px;
  background:linear-gradient(135deg,#C9A84C,#E8C96A);
  color:#000;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
}

.floating-box button:hover{
  transform:translateY(-2px) scale(1.02);
  box-shadow:0 12px 30px rgba(201,168,76,0.4);
}

.whatsapp-float{
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  background:#25D366;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  z-index:9999;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

  color:#fff;
}

/* MOBILE */
@media(max-width:768px){
  .floating-box{
    bottom:20px;
    top:auto;
    right:20px;
    width:90%;
  }
  .badges{grid-template-columns:1fr;}
}

/* DOT */
.dot{
  width:8px;
  height:8px;
  background:#4CAF50;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
  animation:blink 1.2s infinite;
}

@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:0.3;}
}
