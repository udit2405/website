<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Trust Us | GroomFit</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  background: #0c0c0c;
  color: #eaeaea;
  font-family: 'Inter', sans-serif;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 60px 20px;
}

/* ===== RIGHT FLOAT BOX ===== */
.floating-box {
  position: fixed;
  right: 30px;
  top: 50%;
  transform: translateY(-50%);
  width: 260px;
  background: rgba(20,20,20,0.9);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 12px;
  padding: 20px;
  z-index: 999;
  backdrop-filter: blur(10px);
}

.live {
  font-size: 12px;
  color: #4CAF50;
  margin-bottom: 8px;
}

.slots {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 15px;
}

.btn {
  width: 100%;
  padding: 12px;
  background: #C9A84C;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

/* ===== TEAM ===== */
.team {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
}

.card {
  background: rgba(255,255,255,0.03);
  padding: 25px;
  border-radius: 16px;
  text-align: center;
}

.avatar {
  width: 90px;
  height: 90px;
  margin: auto;
  margin-bottom: 15px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid #C9A84C;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== POPUP ===== */
#leadPopup, #successPopup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.popup-box {
  background: #111;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
}

/* MOBILE FIX */
@media(max-width:768px){
  .floating-box {
    bottom: 20px;
    top: auto;
    transform: none;
    right: 20px;
    width: 90%;
  }
}

</style>
</head>

<body>

<div class="container">

<h1 style="text-align:center;">Why Trust GroomFit</h1>

<!-- TEAM -->
<div class="team">

<div class="card">
<div class="avatar"><img src="jitu.jpg"></div>
<h4>Jinendra Sharma</h4>
<p>Certified Trainer</p>
</div>

<div class="card">
<div class="avatar"><img src="rahul.jpg"></div>
<h4>Rahul Sharma</h4>
<p>Strength Coach</p>
</div>

<div class="card">
<div class="avatar"><img src="udit.jpg"></div>
<h4>Udit Sahai</h4>
<p>Founder</p>
</div>

</div>

</div>

<!-- ===== FLOATING BOX ===== -->
<div class="floating-box">
  <div class="live">● Applications Live</div>
  <div class="slots">3 / 11 Slots Left</div>
  <button class="btn" onclick="openPopup()">Check If I Qualify</button>
</div>

<!-- ===== LEAD POPUP ===== -->
<div id="leadPopup">
  <div class="popup-box">

    <h3>Check If You Qualify</h3>

    <form id="leadForm">
      <input type="text" name="name" placeholder="Name" required style="width:100%;margin-bottom:10px;padding:10px;">
      <input type="tel" name="phone" placeholder="Phone" required style="width:100%;margin-bottom:10px;padding:10px;">
      <input type="text" name="location" placeholder="Location" required style="width:100%;margin-bottom:10px;padding:10px;">

      <button type="submit" class="btn">Submit</button>
    </form>

  </div>
</div>

<!-- ===== SUCCESS POPUP ===== -->
<div id="successPopup">
  <div class="popup-box" style="text-align:center">

    <h3>Application Received</h3>

    <a id="whatsappBtn" href="#" target="_blank" class="btn" style="margin-bottom:10px;">
      Continue on WhatsApp
    </a>

    <button onclick="closeSuccess()" style="background:none;border:none;color:#aaa;">
      Maybe Later
    </button>

  </div>
</div>

<script>

function openPopup(){
  document.getElementById("leadPopup").style.display="flex";
}

function closePopup(){
  document.getElementById("leadPopup").style.display="none";
}

function closeSuccess(){
  document.getElementById("successPopup").style.display="none";
}

document.getElementById("leadForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name = this.name.value;

  const msg = `Hi, I applied for GroomFit. My name is ${name}`;
  const link = "https://wa.me/919588859960?text=" + encodeURIComponent(msg);

  document.getElementById("whatsappBtn").href = link;

  document.getElementById("leadPopup").style.display="none";
  document.getElementById("successPopup").style.display="flex";

  this.reset();
});

</script>

</body>
</html>
