<div style="text-align:center;margin:60px 0;">
  <button onclick="openPopup()" class="btn">Check If I Qualify →</button>
</div>

<!-- ===== BACK HOME ===== -->

<!-- ===== POPUP ===== -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h3>Check If You Qualify</h3>
    <form id="leadForm">
      <input name="name" placeholder="Name" required>
      <input name="phone" placeholder="Phone" required>
      <input name="location" placeholder="Location" required>
      <button class="btn" type="submit">Submit</button>
    </form>
  </div>
</div>

<!-- ===== SUCCESS ===== -->
<div class="success" id="success">
  <div class="success-box">
    <h2>Application Received</h2>

    <a id="waBtn" href="#" class="btn">Connect on WhatsApp</a><br><br>
    <a href="https://www.groomfit.in/#pricing" class="btn">View Pricing</a><br><br>

    <button onclick="closeSuccess()" style="background:none;color:#aaa;border:none;">
      Maybe Later
    </button>
  </div>
</div>

<script>

// ===== KEEP YOUR ORIGINAL JS =====

// ===== ADD FORM FLOW =====
document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("leadForm");
  if(form){
    form.addEventListener("submit", function(e){
      e.preventDefault();

      const data = new FormData(this);
      const msg = encodeURIComponent("Hi, I applied. Name: "+data.get("name"));

      document.getElementById("waBtn").href =
        "https://wa.me/919588859960?text="+msg;

      document.getElementById("popup").style.display="none";
      document.getElementById("success").style.display="flex";
    });
  }

});

function openPopup(){
  document.getElementById("popup").style.display="flex";
}

function closeSuccess(){
  document.getElementById("success").style.display="none";
}

</script>
